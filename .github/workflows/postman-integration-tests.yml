name: Postman Integration Tests

on:
  push:
    branches:
      - develop
      - feature/postman-integration-tests
  pull_request:
    branches:
      - develop

jobs:
  postman-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Give Maven wrapper permission
        run: chmod +x mvnw

      - name: Run unit tests
        run: ./mvnw test

      - name: Start Spring Boot API
        run: |
          ./mvnw spring-boot:run > app.log 2>&1 &
          echo $! > app.pid

      - name: Wait for API to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8080/categories > /dev/null; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API..."
            sleep 5
          done
          echo "API did not start in time"
          cat app.log
          exit 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman collection with Newman
        run: |
          newman run postman/CoffeeAndStudy_Integration_Tests.postman_collection.json \
            -e postman/CoffeeAndStudy_Local.postman_environment.json